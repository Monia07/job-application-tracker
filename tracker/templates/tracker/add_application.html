{% extends "tracker/base.html" %} {% block content %}
<div class="card shadow-sm border-0">
  <div class="card-body p-4">
    <h1 class="mb-3">Add Application</h1>
    <p class="text-muted">
      Fill in the form below to add a new job application.
    </p>

    <form method="post">
      {% csrf_token %} {{ form.as_p }}
      <div class="mt-3">
        <button type="submit" class="btn btn-success">Save Application</button>
        <a href="{% url 'application_list' %}" class="btn btn-outline-secondary"
          >Cancel</a
        >
      </div>
    </form>
  </div>
</div>
{% endblock %}
